# 🔹 Use GPU decoding (important)
hwdec=auto-safe

# 🔹 Use simple GPU context
vo=gpu
gpu-context=x11egl   # (or wayland if you use wayland)

# 🔹 Reduce scaling cost
scale=bilinear
cscale=bilinear
dscale=bilinear

# 🔹 Disable heavy features
deband=no
sigmoid-upscaling=no

# 🔹 Lower cache
cache=yes
cache-secs=5

# 🔹 Drop frames if needed
framedrop=vo

# 🔹 Sync to display (lighter than interpolation)
video-sync=display-resample

# 🔹 Disable interpolation (very heavy)
interpolation=no

# 🔹 Reduce threads (avoid CPU spikes)
vd-lavc-threads=2

# 🔹 Audio simple
audio-channels=stereo
ytdl-format=bestvideo[height<=720][vcodec^=avc1]+bestaudio/best[height<=720][vcodec^=avc1]/bestvideo[height<=720]+bestaudio/best[height<=720]
