# ========================
font_family      JetBrainsMono Mono
bold_font        JetBrainsMono Mono Bold
italic_font      JetBrainsMono Mono Italic
bold_italic_font JetBrainsMono Mono Bold Italic
font_size        12.0

# ========================
# Window / Appearance
# ========================
background_opacity 0.5
dynamic_background_opacity yes

# Kitty does not use explicit padding like Alacritty in same way
# You can simulate:
window_padding_width 0

 ========================
 Colors (Primary)
 ========================
 foreground #e0e0e0
 background #000000

 ========================
 Colors (Normal)
 ========================
 color0  #111111
 color1  #ff2e2e
 color2  #888888
 color3  #cc1f1f
 color4  #666666
 color5  #ff2e2e
 color6  #999999
 color7  #e0e0e0

 ========================
 Colors (Bright)
 ========================
 color8  #444444
 color9  #ff4d4d
 kitty requires full set, so fallback:
 color10 #888888
 color11 #cc1f1f
 color12 #666666
 color13 #ff2e2e
 color14 #999999
 color15 #ffffff

# ========================
# Cursor
# ========================
cursor_shape underline
cursor_blink_interval 0.5
cursor_underline_thickness 2

# ========================
# Keybindings (Font Control)
# ========================
map ctrl+plus  change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0
confirm_os_window_close 0


# BEGIN_KITTY_THEME
# Hachiko
# END_KITTY_THEME
