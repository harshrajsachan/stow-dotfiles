#################################
# Picom — Minimal + Smooth + Low Resource
#################################

backend = "glx";
vsync = true;

#################################
# Shadows
#################################

shadow = false;

#################################
# Animations / Fading
#################################

fading = false;

#################################
# Blur (disabled for performance)
#################################

blur-method = "none";
blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;

#################################
# Opacity
#################################

active-opacity = 0.95;
inactive-opacity = 0.85;
frame-opacity = 1.0;

opacity-rule = [
  # Fullscreen windows fully opaque
  "100:fullscreen",

  # Terminal transparency
  "88:class_g = 'Alacritty'",
  "88:class_g = 'kitty'",

  # Notifications
  "88:class_g = 'Dunst'",

  # Launcher
  "92:class_g = 'Rofi'",

  # Websites/videos fully opaque
  "100:name *= '9anime'",
  "100:name *= 'NetMirror'",
  "100:name *= 'YouTube'",

  # Media players
  "100:class_g = 'mpv'",
  "100:class_g = 'vlc'"
];

#################################
# Rounded Corners
#################################

corner-radius = 6;

rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'dmenu'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Focus Handling
#################################

mark-wmwin-focused = true;
mark-ovredir-focused = true;

detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

#################################
# Performance Optimizations
#################################

use-damage = true;

# Lower overhead
detect-rounded-corners = false;

# Better fullscreen performance
unredir-if-possible = true;

# Reduce tearing/sync issues
xrender-sync-fence = true;

#################################
# Window Types
#################################

wintypes:
{
  tooltip = {
    fade = false;
    shadow = false;
    opacity = 1.0;
  };

  dock = {
    shadow = false;
  };

  dnd = {
    shadow = false;
  };

  popup_menu = {
    opacity = 1.0;
  };

  dropdown_menu = {
    opacity = 1.0;
  };
};
