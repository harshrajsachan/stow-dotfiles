[colors]
base = #00000000
mantle = #00000000
crust = #00000000

text = #f0f0f0
subtext1 = #d4c8c8
overlay0 = #b0a0a0

surface0 = #1a1a1a
surface1 = #252525
surface2 = #303030

red = #c24c5a
red-alt = #d35d6e
red-soft = #e07a86

white = #ffffff
gray = #d6d6d6

transparent = #00000000


; ==================================================
;                     BAR
; ==================================================

[bar/main]
width = 100%
height = 12pt
radius = 0

background = #00000000
foreground = ${colors.text}

line-size = 0
border-size = 0
border-color = ${colors.transparent}

padding-left = 0
padding-right = 1

module-margin = 0

separator = " "
separator-foreground = ${colors.transparent}

font-0 = "JetBrainsMono Nerd Font:style=Regular:size=9;2"
font-1 = "Noto Color Emoji:size=9"

; removed xwindow from here
modules-left = i3
modules-center = date
modules-right = mpd pulseaudio brightness memory cpu battery wlan

cursor-click = pointer
enable-ipc = true
wm-restack = i3
override-redirect = false


; ==================================================
;                      i3
; ==================================================

[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true

format = <label-state>

label-focused = %name%
label-focused-background = ${colors.red}
label-focused-foreground = ${colors.white}
label-focused-underline = ${colors.red-soft}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1
label-unfocused-foreground = ${colors.gray}

label-visible = %name%
label-visible-padding = 1
label-visible-foreground = ${colors.red-soft}

label-urgent = %name%
label-urgent-background = ${colors.red-alt}
label-urgent-foreground = ${colors.white}
label-urgent-padding = 1


; ==================================================
;                     DATE
; ==================================================

[module/date]
type = internal/date
interval = 1

date = %I:%M %p

format = <label>
format-padding = 1

label = 󰥔 %date%
label-foreground = #ffffff


; ==================================================
;                      MPD
; ==================================================

[module/mpd]
type = internal/mpd

host = 127.0.0.1
port = 6600

format-online = <toggle> <label-song>
format-online-foreground = ${colors.red-soft}

label-song = %title%
label-song-maxlen = 25
label-song-ellipsis = true
label-song-foreground = ${colors.text}

label-offline = Offline
label-offline-foreground = ${colors.gray}

icon-play = 󰐊
icon-pause = 󰏤
icon-stop = 󰓛

toggle-on-foreground = ${colors.red}
toggle-off-foreground = ${colors.gray}

click-left = alacritty -e ncmpcpp

scroll-up = mpc volume +5
scroll-down = mpc volume -5


; ==================================================
;                    AUDIO
; ==================================================

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>

label-volume = %percentage%%
label-volume-foreground = ${colors.text}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾

ramp-volume-foreground = ${colors.red}

label-muted = muted
label-muted-foreground = ${colors.gray}

click-right = pavucontrol

scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%


; ==================================================
;                  BRIGHTNESS
; ==================================================

[module/brightness]
type = internal/backlight
card = intel_backlight

format = 󰃠 <label>
format-foreground = ${colors.red-soft}

label = %percentage%%
label-foreground = ${colors.text}

enable-scroll = true
scroll-interval = 5


; ==================================================
;                     CPU
; ==================================================

[module/cpu]
type = internal/cpu
interval = 3

format-prefix = "󰍛 "
format-prefix-foreground = ${colors.red}

label = %percentage%%
label-foreground = ${colors.text}


; ==================================================
;                    MEMORY
; ==================================================

[module/memory]
type = internal/memory
interval = 3

format-prefix = "󰘚 "
format-prefix-foreground = ${colors.red-soft}

label = %percentage_used%%
label-foreground = ${colors.text}


; ==================================================
;                   BATTERY
; ==================================================

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

poll-interval = 5
full-at = 98
low-at = 15

format-charging = 󰂄 <label-charging>
format-charging-foreground = ${colors.red-soft}

label-charging = %percentage%%
label-charging-foreground = ${colors.text}

format-discharging = 󰁹 <label-discharging>
format-discharging-foreground = ${colors.text}

label-discharging = %percentage%%
label-discharging-foreground = ${colors.text}

label-full = 󰁹 100%
label-full-foreground = ${colors.text}


; ==================================================
;                    NETWORK
; ==================================================

[module/wlan]
type = internal/network

interface = wlan0
interface-type = wireless
interval = 5

format-connected = 󰖩 <label-connected>

label-connected = %essid%
label-connected-foreground = ${colors.text}

format-disconnected = offline
label-disconnected-foreground = ${colors.red}


; ==================================================
;                   SETTINGS
; ==================================================

[settings]
screenchange-reload = true
pseudo-transparency = true
